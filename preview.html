<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TradeJournal Login Preview</title>
  <style>
    :root{--bg:#0F172A;--card:#0b1227cc;--line:#334155;--muted:#94a3b8;--accent:#10B981}
    *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(1000px 500px at 10% 10%,#10B98122,transparent),radial-gradient(900px 600px at 90% 90%,#64748B33,transparent),var(--bg);color:#e2e8f0}
    .card{width:min(94vw,430px);background:var(--card);backdrop-filter:blur(14px);border:1px solid #475569aa;border-radius:20px;padding:24px;box-shadow:0 20px 60px #00000066}
    .logo{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#34d399,#10B981);color:#052e2b;font-weight:900;margin:0 auto 12px}
    h1{margin:0;text-align:center;font-size:28px}
    p{margin:6px 0 14px;text-align:center;color:#cbd5e1}
    .trust{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);background:#1e293bcc;padding:6px 10px;border-radius:999px;font-size:12px;color:#cbd5e1}
    .center{display:flex;justify-content:center}
    .btn{width:100%;height:44px;border-radius:10px;border:1px solid #475569;background:#1E293B;color:#fff;font-weight:700;margin-top:14px}
    .line{height:1px;background:#475569;margin:16px 0;position:relative}
    .line span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#0b1227;padding:0 8px;color:#94a3b8;font-size:11px}
    label{display:block;font-size:13px;color:#cbd5e1;margin:8px 0 6px}
    input{width:100%;height:42px;border:1px solid #475569;border-radius:10px;background:#1E293B;color:#f1f5f9;padding:0 12px;outline:none}
    input:focus{border-color:#10B981;box-shadow:0 0 0 3px #10B98133}
    .submit{background:linear-gradient(90deg,#10B981,#34d399);color:#052e2b;border:none;box-shadow:0 0 20px #10B98155}
    .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .badge{font-size:12px;background:#1e293bcc;padding:8px;border-radius:8px;text-align:center;color:#cbd5e1}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TJ</div>
    <h1>TradeJournal</h1>
    <p>Track performance and sharpen your edge</p>
    <div class="center"><span class="trust">Trusted by 2,300+ active traders</span></div>
    <button class="btn">Continue with Google</button>
    <div class="line"><span>OR USE EMAIL</span></div>
    <label>Email</label><input placeholder="you@example.com" />
    <label>Password</label><input type="password" placeholder="Enter your password" />
    <button class="btn submit">Sign in</button>
    <div class="badges">
      <div class="badge">Live KPIs</div>
      <div class="badge">Secure Auth</div>
      <div class="badge">Analytics</div>
    </div>
  </div>
</body>
</html>
